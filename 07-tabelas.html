<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas em HTML 5</title>
</head>
<body>
    <h1>tabelas em HTML 5</h1>
    <table border="1">
        <thead>
            <tr>
                <th>nome do ALuno</th>
                <th>disciplina</th>
                <th>nota final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>nelson</td>
                <td>portugues</td>
                <td>5,0</td>
            </tr>
            
            <tr>
                <td >valentina</td>
                <td>matematica</td>
                <td>8,0</td>
            </tr>

            <tr>
                <td>japa</td>
                <td>fisica</td>
                <td>10,00</td>
            </tr>

            <tr>
                <td>vitor</td>
                <td>geografia</td>
                <td>2,0</td>
            </tr>

            <tr>
                <td>alexandre</td>
                <td>educação fisicia</td>
                <td>9,00</td>
            </tr>

            <tr>
                <td>isabela</td>
                <td>artes</td>
                <td>10,00</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">média da turma</td>
                <td><strong>7,0</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
